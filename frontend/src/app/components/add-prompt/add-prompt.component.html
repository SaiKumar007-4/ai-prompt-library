<h2>Add New Prompt</h2>

<form [formGroup]="promptForm" (ngSubmit)="onSubmit()">

    <div>

        <label>Title:</label>

        <input type="text" formControlName="title" />

        <div *ngIf="promptForm.get('title')?.touched">

            <p *ngIf="promptForm.get('title')?.errors?.['required']">

                Title is required

            </p>

            <p *ngIf="promptForm.get('title')?.errors?.['minlength']">

                Title must be at least 3 characters

            </p>

        </div>

    </div>

    <br>

    <div>

        <label>Content:</label>

        <textarea formControlName="content" rows="5"></textarea>

        <div *ngIf="promptForm.get('content')?.touched">

            <p *ngIf="promptForm.get('content')?.errors?.['required']">

                Content is required

            </p>

            <p *ngIf="promptForm.get('content')?.errors?.['minlength']">

                Content must be at least 20 characters

            </p>

        </div>

    </div>

    <br>

    <div>

        <label>Complexity:</label>

        <input type="number" formControlName="complexity" min="1" max="10" />

        <div *ngIf="promptForm.get('complexity')?.touched">

            <p *ngIf="promptForm.get('complexity')?.errors?.['min']">

                Minimum value is 1

            </p>

            <p *ngIf="promptForm.get('complexity')?.errors?.['max']">

                Maximum value is 10

            </p>

        </div>

    </div>

    <br>

    <button type="submit" [disabled]="promptForm.invalid">

        Add Prompt

    </button>

</form>
